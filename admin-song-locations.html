<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, interactive-widget=resizes-content" />
  <title>Admin - Caminhos de Musicas</title>
  <link rel="stylesheet" href="/assets/css/admin-song-locations.css" />
</head>
<body>
  <main class="admin-layout">
    <section id="admin-login-card" class="admin-card">
      <h1 class="admin-title">Administracao de Caminhos</h1>
      <p class="admin-lead">
        Entre com a senha administrativa para editar a arvore de caminhos de musicas.
      </p>
      <form id="admin-login-form" class="admin-form" autocomplete="off">
        <label for="admin-password-input" class="admin-label">Senha</label>
        <input
          id="admin-password-input"
          class="admin-input"
          type="password"
          placeholder="Digite a senha"
          required
        />
        <button id="admin-login-submit" class="admin-btn admin-btn-primary" type="submit">
          Entrar
        </button>
      </form>
    </section>

    <section id="admin-panel-card" class="admin-card" hidden>
      <header class="admin-panel-head">
        <div>
          <h2 class="admin-subtitle">Arvore de Caminhos</h2>
          <p class="admin-lead">
            Exclusao neste painel e definitiva e remove tambem os vinculos das musicas.
          </p>
        </div>
        <button id="admin-logout-btn" class="admin-btn admin-btn-ghost" type="button">
          Sair
        </button>
      </header>

      <p id="admin-status" class="admin-status" aria-live="polite"></p>

      <form id="admin-add-form" class="admin-form admin-inline-form" autocomplete="off">
        <div class="admin-field">
          <label for="admin-parent-select" class="admin-label">Adicionar dentro de</label>
          <select id="admin-parent-select" class="admin-select"></select>
        </div>
        <div class="admin-field">
          <label for="admin-node-label" class="admin-label">Nome do item</label>
          <input
            id="admin-node-label"
            class="admin-input"
            type="text"
            placeholder="Ex.: Gozosos"
            maxlength="120"
            required
          />
        </div>
        <div class="admin-actions">
          <button id="admin-add-submit" class="admin-btn admin-btn-primary" type="submit">
            Adicionar
          </button>
          <button id="admin-refresh-btn" class="admin-btn admin-btn-ghost" type="button">
            Atualizar
          </button>
        </div>
      </form>

      <section class="admin-tree-wrap">
        <h3 class="admin-tree-title">Itens</h3>
        <p id="admin-tree-empty" class="admin-tree-empty" hidden>Nenhum item encontrado.</p>
        <div id="admin-tree" class="admin-tree"></div>
      </section>
    </section>
  </main>

  <script src="/assets/js/admin-song-locations.js"></script>
</body>
</html>

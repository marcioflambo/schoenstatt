services:
  portal:
    container_name: schoenstatt-portal
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      uvicorn backend.app.main:app
      --host 0.0.0.0
      --port 8000
      --proxy-headers
      --forwarded-allow-ips=*
    environment:
      DATABASE_URL: "${DATABASE_URL:-}"
      CORS_ALLOW_ORIGINS: "${CORS_ALLOW_ORIGINS:-https://maerainhavencedora.com.br,https://www.maerainhavencedora.com.br}"
    ports:
      - "${APP_PORT:-8000}:8000"
    restart: unless-stopped

name: "${COMPOSE_PROJECT_NAME:-schoenstatt}"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${LOCAL_POSTGRES_DB:-schoenstatt}"
      POSTGRES_USER: "${LOCAL_POSTGRES_USER:-schoenstatt}"
      POSTGRES_PASSWORD: "${LOCAL_POSTGRES_PASSWORD:-schoenstatt}"
    ports:
      - "${LOCAL_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOCAL_POSTGRES_USER:-schoenstatt} -d ${LOCAL_POSTGRES_DB:-schoenstatt}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  portal:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      uvicorn backend.app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/backend
      --reload-dir /app/assets
      --reload-dir /app/content
      --reload-dir /app
    env_file:
      - backend/.env
    environment:
      WATCHFILES_FORCE_POLLING: "true"
      DATABASE_URL: "${LOCAL_DATABASE_URL:-postgresql://${LOCAL_POSTGRES_USER:-schoenstatt}:${LOCAL_POSTGRES_PASSWORD:-schoenstatt}@postgres:5432/${LOCAL_POSTGRES_DB:-schoenstatt}?sslmode=disable}"
      POSTGRES_HOST: ""
      POSTGRES_PORT: ""
      POSTGRES_USER: ""
      POSTGRES_PASSWORD: ""
      POSTGRES_DB: ""
    expose:
      - "8000"
    volumes:
      - ./:/app
    restart: unless-stopped

  proxy:
    image: caddy:2.8.4-alpine
    depends_on:
      - portal
    environment:
      SITE_DOMAIN: "${SITE_DOMAIN:-maerainhavencedora.com.br}"
    ports:
      - "${PORT_HTTP_ALT:-80}:80"
      - "${PORT_HTTPS_ALT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  postgres_data:
    name: "${LOCAL_POSTGRES_VOLUME_NAME:-shoenstatt_postgres_data}"
  caddy_data:
    name: "${LOCAL_CADDY_DATA_VOLUME_NAME:-shoenstatt_caddy_data}"
  caddy_config:
    name: "${LOCAL_CADDY_CONFIG_VOLUME_NAME:-shoenstatt_caddy_config}"

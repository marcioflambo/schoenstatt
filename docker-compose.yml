services:
  portal:
    container_name: schoenstatt-portal
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      uvicorn backend.app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/backend
      --reload-dir /app/assets
      --reload-dir /app/content
      --reload-dir /app
    env_file:
      - backend/.env
    environment:
      WATCHFILES_FORCE_POLLING: "true"
    expose:
      - "8000"
    volumes:
      - ./:/app
    restart: unless-stopped

  proxy:
    image: caddy:2.8.4-alpine
    container_name: schoenstatt-proxy
    depends_on:
      - portal
    environment:
      SITE_DOMAIN: "${SITE_DOMAIN:-maerainhavencedora.com.br}"
    ports:
      - "${PORT_HTTP_ALT:-80}:80"
      - "${PORT_HTTPS_ALT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

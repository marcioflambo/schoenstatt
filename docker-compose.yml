services:
  portal:
    container_name: schoenstatt-portal
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      uvicorn backend.app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/backend
      --reload-dir /app/assets
      --reload-dir /app/content
      --reload-dir /app
    env_file:
      - backend/.env
    environment:
      WATCHFILES_FORCE_POLLING: "true"
    ports:
      - "${PORT_HTTP:-8000}:8000"
    volumes:
      - ./:/app
    restart: unless-stopped

        <div class="mystery-modal-heading-row rosary-modal-heading-row">
          <p id="rosary-modal-group" class="mystery-modal-group rosary-modal-group"></p>
          <button type="button" class="mystery-modal-close rosary-modal-close" data-rosary-modal-close aria-label="">&times;</button>
        </div>
        <div class="mystery-modal-heading rosary-modal-heading">
          <div class="mystery-modal-title-row rosary-modal-title-row">
            <h3 id="rosary-modal-title"></h3>
          </div>
        </div>
        <p id="rosary-modal-step-text" class="mystery-modal-text rosary-modal-step-text"></p>
        <nav id="rosary-modal-dots" class="rosary-modal-dots" aria-label=""></nav>
      </div>
      <footer class="mystery-modal-footer rosary-modal-footer">
        <p id="rosary-modal-step-counter" class="rosary-modal-step-counter"></p>
      </footer>
    </article>
  </div>

  <div id="favorite-confirm-modal" class="favorite-confirm-modal" aria-hidden="true">
    <div class="favorite-confirm-backdrop" data-favorite-confirm-close></div>
    <article
      class="favorite-confirm-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="favorite-confirm-title"
      aria-describedby="favorite-confirm-message"
    >
      <h3 id="favorite-confirm-title"></h3>
      <p id="favorite-confirm-message"></p>
      <div id="favorite-confirm-password-wrap" class="favorite-confirm-password-wrap" hidden>
        <label id="favorite-confirm-password-label" class="favorite-confirm-password-label" for="favorite-confirm-password-input">
          
        </label>
        <input
          type="password"
          id="favorite-confirm-password-input"
          class="favorite-confirm-password-input"
          autocomplete="off"
          spellcheck="false"
        />
        <p id="favorite-confirm-password-error" class="favorite-confirm-password-error" hidden></p>
      </div>
      <div class="favorite-confirm-actions">
        <button type="button" id="favorite-confirm-cancel" class="btn btn-ghost" data-favorite-confirm-close></button>
        <button type="button" id="favorite-confirm-accept" class="btn btn-primary"></button>
      </div>
    </article>
  </div>

  <div id="mystery-song-assign-modal" class="mystery-song-assign-modal" aria-hidden="true">
    <div class="mystery-song-assign-backdrop" data-mystery-song-assign-close></div>
    <article
      class="mystery-song-assign-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="mystery-song-assign-title"
    >
      <div class="mystery-song-assign-heading-row">
        <h3 id="mystery-song-assign-title"></h3>
        <button
          type="button"
          class="mystery-song-assign-close"
          data-mystery-song-assign-close
          aria-label=""
        >
          &times;
        </button>
      </div>
      <p id="mystery-song-assign-song" class="mystery-song-assign-song"></p>
      <div id="mystery-song-assign-list" class="mystery-song-assign-list"></div>
    </article>
  </div>

  <div id="song-save-location-picker" class="song-save-location-picker" aria-hidden="true">
    <header class="song-save-location-picker-head">
      <div class="song-save-location-picker-head-main">
        <p id="song-save-location-picker-song" class="song-save-location-picker-song"></p>
        <div class="song-save-location-picker-breadcrumb-row">
          <button
            type="button"
            id="song-save-location-picker-add"
            class="song-save-location-picker-add"
            aria-label="Adicionar item"
            title="Adicionar item"
            hidden
          >
            +
          </button>
          <p id="song-save-location-picker-breadcrumb" class="song-save-location-picker-breadcrumb"></p>
        </div>
      </div>
      <button
        type="button"
        id="song-save-location-picker-close"
        class="song-save-location-picker-close"
        aria-label=""
      >
        &times;
      </button>
    </header>
    <div class="song-save-location-picker-tools">
      <input
        type="search"
        id="song-save-location-picker-search"
        class="song-save-location-picker-search"
        placeholder=""
        aria-label=""
        autocomplete="off"
      />
      <button
        type="button"
        id="song-save-location-picker-back"
        class="song-save-location-picker-back"
        hidden
      >
        
      </button>
    </div>
    <div id="song-save-location-picker-list" class="song-save-location-picker-list"></div>
  </div>

  <div id="song-location-create-modal" class="song-location-create-modal" aria-hidden="true">
    <div class="song-location-create-backdrop" data-song-location-create-close></div>
    <article
      class="song-location-create-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="song-location-create-title"
    >
      <h3 id="song-location-create-title"></h3>
      <p id="song-location-create-target-hint"></p>
      <select id="song-location-create-parent" class="song-location-create-parent"></select>
      <p id="song-location-create-hint"></p>
      <input
        id="song-location-create-input"
        class="song-location-create-input"
        type="text"
        maxlength="120"
        autocomplete="off"
      />
      <footer class="song-location-create-actions">
        <button
          type="button"
          id="song-location-create-cancel"
          class="btn btn-ghost"
          data-song-location-create-close
        >
          Cancelar
        </button>
        <button type="button" id="song-location-create-accept" class="btn btn-primary">Adicionar</button>
      </footer>
    </article>
  </div>

  <div id="custom-song-modal" class="custom-song-modal" aria-hidden="true">
    <div class="custom-song-backdrop" data-custom-song-modal-close></div>
    <article
      class="custom-song-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="custom-song-modal-title"
    >
      <header class="custom-song-header">
        <h3 id="custom-song-modal-title"></h3>
        <button type="button" id="custom-song-modal-close" class="custom-song-close" data-custom-song-modal-close aria-label="">&times;</button>
      </header>

      <div class="custom-song-fields">
        <label class="custom-song-field">
          <span id="custom-song-title-label"></span>
          <input id="custom-song-title-input" class="custom-song-input" type="text" maxlength="160" />
        </label>
        <label class="custom-song-field custom-song-field-key">
          <span id="custom-song-key-label"></span>
          <input id="custom-song-key-input" class="custom-song-input" type="text" maxlength="18" />
        </label>
      </div>

      <nav class="custom-song-tabs" aria-label="">
        <button
          type="button"
          id="custom-song-tab-lyrics"
          class="custom-song-tab is-active"
          data-custom-song-tab="lyrics"
          aria-controls="custom-song-panel-lyrics"
          aria-selected="true"
        >
          
        </button>
        <button
          type="button"
          id="custom-song-tab-chords"
          class="custom-song-tab"
          data-custom-song-tab="chords"
          aria-controls="custom-song-panel-chords"
          aria-selected="false"
        >
          
        </button>
      </nav>

      <section id="custom-song-panel-lyrics" class="custom-song-panel" data-custom-song-panel="lyrics">
        <label class="custom-song-panel-label" for="custom-song-lyrics-input" id="custom-song-lyrics-label"></label>
        <textarea id="custom-song-lyrics-input" class="custom-song-textarea" rows="10"></textarea>
      </section>

      <section id="custom-song-panel-chords" class="custom-song-panel" data-custom-song-panel="chords" hidden>
        <label class="custom-song-panel-label" for="custom-song-chords-input" id="custom-song-chords-label"></label>
        <textarea id="custom-song-chords-input" class="custom-song-textarea" rows="10"></textarea>
      </section>

      <p id="custom-song-draft-status" class="custom-song-draft-status" aria-live="polite"></p>

      <footer class="custom-song-footer">
        <button type="button" id="custom-song-cancel-btn" class="btn btn-ghost" data-custom-song-modal-close></button>
        <button type="button" id="custom-song-save-btn" class="btn btn-primary"></button>
      </footer>
    </article>
  </div>

  <div id="auth-modal" class="auth-modal" aria-hidden="true">
    <div class="auth-modal-backdrop" data-auth-modal-close></div>
    <article class="auth-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="auth-modal-title">
      <header class="auth-modal-header">
        <h3 id="auth-modal-title">Login</h3>
        <button
          type="button"
          id="auth-modal-close"
          class="auth-modal-close"
          data-auth-modal-close
          aria-label="Fechar autenticação"
        >
          &times;
        </button>
      </header>

      <form id="auth-form" class="auth-form">
        <label id="auth-name-field" class="auth-field" for="auth-name-input" hidden>
          <span>Nome</span>
          <input id="auth-name-input" class="auth-input" type="text" maxlength="150" autocomplete="name" />
        </label>
        <label class="auth-field" for="auth-email-input">
          <span>Email</span>
          <div class="auth-input-wrap auth-email-wrap">
            <input id="auth-email-input" class="auth-input" type="email" maxlength="255" autocomplete="email" required />
            <span class="auth-input-icon auth-email-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <rect x="3" y="5.5" width="18" height="13" rx="2.2"></rect>
                <path d="M4 7l8 6 8-6"></path>
              </svg>
            </span>
          </div>
        </label>
        <label class="auth-field" for="auth-password-input">
          <span>Senha</span>
          <div class="auth-password-wrap">
            <input id="auth-password-input" class="auth-input" type="password" maxlength="128" autocomplete="current-password" required />
            <span class="auth-input-icon auth-password-lock" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <rect x="5.2" y="10.2" width="13.6" height="9.3" rx="2"></rect>
                <path d="M8.2 10.2V8a3.8 3.8 0 0 1 7.6 0v2.2"></path>
              </svg>
            </span>
            <button
              type="button"
              id="auth-password-toggle"
              class="auth-password-toggle"
              aria-label="Exibir senha"
              aria-pressed="false"
              title="Exibir senha"
            >
              <span class="auth-password-eye auth-password-eye-open" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path class="eye-lash" d="M4.2 8.4l-1.4-1.4M7 7.1 6 5.3M10.2 6.4 9.8 4.4M13.8 6.4l.4-2M17 7.1l1-1.8M19.8 8.4l1.4-1.4"></path>
                  <path class="eye-outline" d="M2 12c2.5-3.7 5.9-5.5 10-5.5s7.5 1.8 10 5.5c-2.5 3.7-5.9 5.5-10 5.5S4.5 15.7 2 12Z"></path>
                  <circle class="eye-pupil" cx="12" cy="12" r="3.4"></circle>
                  <circle class="eye-glint" cx="10.8" cy="10.8" r="0.85"></circle>
                </svg>
              </span>
              <span class="auth-password-eye auth-password-eye-closed" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path class="eye-closed-arc" d="M3 11.6c2.2 2.4 5.2 3.6 9 3.6s6.8-1.2 9-3.6"></path>
                  <path class="eye-lash" d="M4.3 11.6l-1.5 1.3M7.2 13.3l-1 1.8M10.3 14.4l-.3 2.1M13.7 14.4l.3 2.1M16.8 13.3l1 1.8M19.7 11.6l1.5 1.3"></path>
                </svg>
              </span>
            </button>
          </div>
        </label>
        <p id="auth-form-feedback" class="auth-form-feedback" hidden></p>
        <footer class="auth-form-actions">
          <button type="button" id="auth-delete-btn" class="btn btn-ghost" hidden>Deletar conta</button>
          <button type="submit" id="auth-submit-btn" class="btn btn-primary">Entrar</button>
        </footer>
      </form>
    </article>
  </div>

  <footer class="site-footer">
    <div class="container footer-row">
      <p></p>
      <a href="#inicio"></a>
    </div>
  </footer>

  <div id="song-toast" class="song-toast" role="status" aria-live="polite" hidden></div>

  <script src="./assets/js/portal.js"></script>
</body>
</html>
